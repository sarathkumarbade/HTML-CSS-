<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main-div
    {
        display: grid;
        grid-template-columns: 200px 75px;
        margin-bottom: 30px;
    }
    .main-div2
    {
        display: grid;
        grid-template-columns: 50px 1fr 75px;
        margin-bottom: 30px;
    }

       .main-div3
    {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        margin-bottom: 30px;
        row-gap: 10px
        ;
        column-gap: 20px;
    }

    .first-div
    {
        background-color: pink;

    }
    .second-div
    {
        background-color: aqua;
    }
    .third-div
    {
background-color: rgb(165, 123, 205);
    }
</style>
<body>
   <div class="main-div">
    <div class="first-div">200px</div>
    <div class="second-div">75px
    </div>
   </div>
 

<div class="main-div2">
    <div class="first-div">col1</div>
    <div class="second-div">col2
    </div>
    <div class="third-div">col3</div>
   </div>


   <div class="main-div3">
    <div class="first-div">col1</div>
    <div class="second-div">col2
    </div>
    <div class="third-div">col3</div>
     <div class="first-div">col1</div>
    <div class="second-div">col2
    </div>
    <div class="third-div">col3</div>
     <div class="third-div">col3</div>
     <div class="first-div">col1</div>
   </div>





</body>
</html>
