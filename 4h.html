<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .buttonsdiv {
      display: flex;
      gap: 40px;
    }
    .back-button {
      margin-right: 15px;
     
    }
    .next-button {
      margin-left: 15px;
      gap: 40px;
    }
    span {
      margin: 5px;
      
    }
  </style>
  <body>
    <div class="buttonsdiv">
      <button class="back-button">Back</button>
      <span>1</span>
      <span>2</span>
      <span>3 </span>
      <span>4</span>

      <button class="next-button">Next</button>
    </div>
  </body>
</html>
