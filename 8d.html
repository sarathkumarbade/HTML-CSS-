<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

.firstname{
    height: 25px;
    width: 130px;
    margin-right: 7px;
      border-radius: 9px;
    border: 1px solid grey;
    padding-left: 10px;
   

 


}
.lastname{
        height: 25px;
    width: 135px;
      border-radius: 9px;
    border: 1px solid grey;
    text-indent: 10px;
   

}
.email
{
     height: 25px;
    width: 280px;
    display: block;
    margin-top: 10px;
    margin-bottom: 10px;
    border-radius: 9px;
    border: 1px solid grey;
    text-indent: 10px;

}


.signup-button
{
    background-color: rgb(105, 105, 237);
    color: white;
    border: none;
        height: 33px;
    width: 285px;
    border-radius: 19px;
    font-weight: bold;
    
  

}
.firstname,.email,.lastname
{
    box-sizing: border-box;
}


.location{
    display: block;
    margin-bottom: 15px;
    height: 30px;
    width: 280px;
    border: 1px solid grey;
    border-radius: 8px;
    box-sizing: border-box;
    padding-left: 10px;
    color: black;
    font-weight: 550;
 

}
.destination{
      display: block;
    margin-bottom: 15px;
    height: 30px;
    width: 280px;
    border: 1px solid grey;
    border-radius: 8px;
    box-sizing: border-box;
    padding-left: 10px;
    color: black;
    font-weight: 550;
 

}
.request-button

{
    margin-right: 20px;
    color: white;
    background-color: black;
    border: none;
    height: 25px;
    width: 130px;
}
.schedule-button

{
    margin-right: 20px;
    color: white;
    background-color: black;
    border: none;
    height: 25px;
    width: 130px;
}







</style>
<body>
    <input type="text" placeholder="first name" class="firstname">
    <input type="text" placeholder="last name" class="lastname">
    <input type="text" placeholder="email" class="email">
    <button class="signup-button">Sign Up</button>


    <br>
    <br><br>
    <br>
    <br>
    <br>
    <br>



    <h1>Request a ride now </h1>
    <input type="text" placeholder="Enter location" class="location">
    <input type="text" placeholder="Enter destination" class="destination">
    <button class="request-button">Request now</button>
     <button class="schedule-button">Schedule for later</button>







</body>
</html>
