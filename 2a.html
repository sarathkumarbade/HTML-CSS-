<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .Request-button {
      background-color: black;
      color: white;
      border: none;
      height: 27px;
      width: 100px;
      font-size: smaller;
      cursor: pointer;
      margin-right: 10px;
    }
    .cart-button {
      background-color: rgb(255, 216, 20);
      color: black;
      border: none;
      height: 37px;
      width: 200px;
      border-radius: 55px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }
    .signup-button {
      background-color: rgb(46, 164, 79);
      color: white;
      border: none;
      border-style: solid;
      height: 36px;
      width: 89px;
      border-radius: 10px;
    }
    .getstart-button {
      background-color: rgb(121, 82, 179);
      color: white;
      height: 30px;
      width: 98px;
      border: none;
      border-radius: 7px;
      font-weight: bold;

    }
    .download-button
    {
        height: 30px;
        background-color: rgb(108, 117, 125);
        color: rgb(12, 14, 16);
        width: 98px;
        margin-left: 5px;
        border-style: solid;
        border: none;
    }
    .apply-button
    {
        background-color: rgb(10, 102, 194);
        color: white;
        cursor: pointer
        ;
        font-weight: bold;
        height: 37px;
        width: 260px;
        border: none;
        border-radius: 20px;
        font-weight: bold;

    }
    .save-button
    {
        background-color: white;
        color: rgb(10, 102, 194);
        height: 35px;
        width: 89px;
        font-weight: bold;
        border: 1.4px solid rgb(10, 102, 194);
        border-style: solid;
        border-radius: 20px;
        margin-left: 6px;

    }
  </style>
  <body>
    <button class="Request-button">Request now</button>
    <button class="cart-button">Add to cart</button>
    <button class="signup-button">sign up</button> <br />
    <br />
    <br />
    <br />
    <br />

    <button class="getstart-button">Get start</button>
    <button class="download-button">Download</button>


    <br />
    <br />
    <br />
    <br />

     <button class="apply-button"> Apply on the website</button>
     <button class="save-button">Save</button>







  </body>
</html>
