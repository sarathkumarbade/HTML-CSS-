<!DOCTYPE html>
<html>
<head>
    <title>Simple Pagination</title>
    <style>
        .strech-button
        {
            background-color: rgb(255, 25, 9);
             border: none;
             color: white;
             font-weight: bold;
             padding-left: 16px;
             padding-right: 16px;
             padding-top: 10px;
             padding-bottom: 10px;
             cursor: pointer;
             

        }

        .strech-button:hover
        {
            padding-right: 30px;
            padding-bottom: 25px;
            
        }


        .shadow-button
        {
            background-color: rgb(9, 255, 13);
             border: 1px solid rgb(9, 255, 13);
             color: white;
             font-weight: bold;
             padding-left: 16px;
             padding-right: 16px;
             padding-top: 10px;
             padding-bottom: 10px;
             cursor: pointer;
             box-sizing: border-box;
             

        }

        .shadow-button:hover
        {

          
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            text-shadow: brown;
            transition: ease-in;
            

            
        }

        .one-button
        {
            background-color: rgb(9, 255, 13);
             border: 1px solid rgb(9, 255, 13);
             color: white;
             font-weight: bold;
             padding-left: 16px;
             padding-right: 16px;
             padding-top: 10px;
             padding-bottom: 10px;
             cursor: pointer;
             box-sizing: border-box;
        }

         .one-button:hover
        {
            padding-right: 30px;
           padding-left: 30px;
           margin: 5px;
            
        }


         .two-button
        {
            background-color: rgb(9, 255, 13);
             border: 1px solid rgb(9, 255, 13);
             color: white;
             font-weight: bold;
             padding-left: 16px;
             padding-right: 16px;
             padding-top: 10px;
             padding-bottom: 10px;
             cursor: pointer;
             box-sizing: border-box;
        }

         .two-button:hover
        {
            padding-right: 30px;
           padding-left: 30px;
          margin: 5px;
            
        }



         .three-button
        {
            background-color: rgb(9, 255, 13);
             border: 1px solid rgb(9, 255, 13);
             color: white;
             font-weight: bold;
             padding-left: 16px;
             padding-right: 16px;
             padding-top: 10px;
             padding-bottom: 10px;
             cursor: pointer;
             box-sizing: border-box;
        }

         .three-button:hover
        {
            padding-right: 30px;
           padding-left: 30px;
           margin-left: 10px;
           margin: 5px;
            
        }









    </style>
</head>
<body>

<button class="strech-button">Strech</button>

<br>
<br>
<br>
<br>
<br>
<br>



<button class="shadow-button">shadow</button>



<br>
<br>
<br>
<br>
<br>
<br>

<button class="one-button">one</button>
<button class="two-button">two</button>
<button class="three-button">three</button>





</body>
</html>
