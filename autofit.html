<!DOCTYPE html>
<html>
<head>
<style>
.container {
  width: 900px;              /* VERY IMPORTANT */
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  border: 3px solid red;
}
.item {
  background: lightblue;
  padding: 40px;
  text-align: center;
}
</style>
</head>
<body>

<h3>auto-fill</h3>

<div class="container">
  <div class="item">1</div>
  <div class="item">2</div>
</div>

</body>
</html>
