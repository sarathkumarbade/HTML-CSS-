<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .profile-div
    {

width: 200px;
height: 200px;
    }
    .profile{
        width:200px;
        height: 200px;
        object-fit: cover; }
    .combo-div
    {
        display: grid;
        grid-template-columns: 30px 1fr;
    }
    .miniprofile{
        width: 25px;
        height: 25px;
        object-fit: cover;
        border-radius: 50px;
        margin-left: 10px;
       margin-bottom: 10px;
    }
    .combo2{
      
        width: 200px;
        grid-template-rows: 200px 200px 200px;
        row-gap: 1px;
     box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }
    .oliver-p
    {
        font-weight: bold;
        margin-left: 5px;
        margin-top: 1px;
        margin-bottom: 5px;
       
      
       
       
       
    }
    .friends-p
    {

        color: gray;
        margin-top: 5px;
        font-size: 13px;
        margin-left: 10px;
     
       

    }
    .add-button
    {
        background-color: blue;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 3px;
        margin-left: 10px;
        margin-bottom: 10px;
    }


</style>
<body>
    <div class="profile-div"><img src="boom boom.avif" alt="" class="profile"></div>
    <div class="combo2">
        <div class="oliver-div"><p class="oliver-p">oliver</p></div>
        <div class="combo-div">
             <div class="mini-div3"><img src="boom boom.avif" alt="" class="miniprofile"></div>
              <div class="friends-div"><p class="friends-p">2 mutual friends</p></div>
        </div>
       
        <div class="add-div"><button class="add-button">add friend</button></div>

    </div>
</body>
</html>
