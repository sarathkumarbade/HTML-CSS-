<!DOCTYPE html>
<html>
<head>
  <title>auto-fill demo</title>
  <style>
    body {
      font-family: Arial;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      border: 2px solid black;
      padding: 10px;
    }

    .item {
      background: lightblue;
      padding: 40px;
      text-align: center;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h2>auto-fill</h2>
<p>Resize window. Empty columns remain.</p>

<div class="container">
  <div class="item">1</div>
  <div class="item">2</div>
    <div class="item">1</div>
  <div class="item">2</div>
    <div class="item">1</div>
  <div class="item">2</div>
    <div class="item">1</div>
  <div class="item">2</div>
</div>

</body>
</html>
